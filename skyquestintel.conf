# Redirect bare domain to www
server {
    listen 80;
    server_name skyquestintel.com;
    return 301 https://www.skyquestintel.com$request_uri;
}

# Redirect www HTTP to HTTPS
server {
    listen 80;
    server_name www.skyquestintel.com;
    return 301 https://www.skyquestintel.com$request_uri;
}

# Redirect bare domain HTTPS to www HTTPS
server {
    listen 443 ssl;
    server_name skyquestintel.com;

    ssl_certificate /etc/letsencrypt/live/skyquestintel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skyquestintel.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.skyquestintel.com$request_uri;
}

# Main: www.skyquestintel.com HTTPS
server {
    listen 443 ssl;
    server_name www.skyquestintel.com;

    ssl_certificate /etc/letsencrypt/live/skyquestintel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skyquestintel.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
